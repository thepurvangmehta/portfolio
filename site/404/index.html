.pm-footer{--pm-fg:var(--ds-ink,rgb(25,25,25));--pm-mut:rgb(140,140,140);--pm-sub:var(--ds-ink-soft,rgb(77,77,77));--pm-acc:var(--ds-accent,rgb(28,53,236));

<script>
document.addEventListener("DOMContentLoaded", function () {

  document.querySelectorAll("[data-tags]").forEach(function (el) {

    const text = el.innerText;
    if (!text) return;

    const tags = text.split(",").map(tag => tag.trim());

    const container = document.createElement("div");
    container.style.display = "flex";
    container.style.flexWrap = "wrap";
    container.style.gap = "8px";

    tags.forEach(tag => {
      const span = document.createElement("span");
      span.innerText = tag;
      span.style.padding = "6px 12px";
      span.style.background = "#f3f3f3";
      span.style.borderRadius = "999px";
      span.style.fontSize = "12px";
      span.style.fontWeight = "500";

      container.appendChild(span);
    });

    el.innerHTML = "";
    el.appendChild(container);

  });

});
</script>
